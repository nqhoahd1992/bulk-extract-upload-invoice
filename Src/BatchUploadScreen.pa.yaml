Screens:
  BatchUploadScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =If(
            gInvoiceParseBatchID <> gSelectedBatch.ID,
            Clear(colInvoiceParseResults);
            Set(gSelectedInvoiceRow, Blank());
            Reset(ddDefaultCostCenter);
            Set(gInvoiceParseBatchID, gSelectedBatch.ID)
        );
        Set(gProcessingBatch, false);
        ClearCollect(colBaselineAttachmentNames, ForAll(gSelectedBatch.Attachments, {Name: DisplayName}))
    Children:
      - rectHeader_1:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_1:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Invoice Batch - " & gSelectedBatch.Title
            Width: =900
            X: =20
      - rowFooter:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =10
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnBack:
                Control: ModernButton@1.0.0
                Properties:
                  Align: =Align.Center
                  DisplayMode: =If(gFinalizing || gProcessingBatch, DisplayMode.Disabled, DisplayMode.Edit)
                  FontWeight: =""
                  Height: =36
                  OnSelect: |-
                    =Clear(colInvoiceParseResults);
                    Clear(colPendingUploadNames);
                    Set(gSelectedInvoiceRow, Blank());
                    Set(gInvoiceParseBatchID, Blank());
                    Reset(ddDefaultCostCenter);
                    Reset(rdoProcessingMode);
                    ResetForm(formBatchUpload);
                    Navigate(HomeScreen)
                  PaddingBottom: =5
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =5
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Text: ="← Back"
                  VerticalAlign: =VerticalAlign.Middle
                  Width: =100
            - lblInvoiceCount:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  FillPortions: =1
                  Height: =36
                  Size: =10
                  Text: |-
                    =If(
                        gFinalizing,
                        "⏳ Finalizing invoices... Do not leave this page.",
                        gProcessingBatch,
                        "⏳ Uploading & parsing invoices... Do not leave this page.",
                        CountRows(Filter(colInvoiceParseResults, Not(ParseError))) & " invoice(s) ready" &
                        If(CountRows(Filter(colInvoiceParseResults, ParseError)) > 0, " · " & CountRows(Filter(colInvoiceParseResults, ParseError)) & " parse failed - fix or remove first", "") &
                        If(
                            CountRows(Filter(colInvoiceParseResults, Not(ParseError) && (IsBlank(SupplierNameEdit) || IsBlank(TotalAmountEdit) || IsBlank(InvoiceNumberEdit) || IsBlank(InvoiceDateEdit) || IsBlank(BilledToEdit) || IsBlank(CurrencyEdit)))) > 0,
                            " · " & CountRows(Filter(colInvoiceParseResults, Not(ParseError) && (IsBlank(SupplierNameEdit) || IsBlank(TotalAmountEdit) || IsBlank(InvoiceNumberEdit) || IsBlank(InvoiceDateEdit) || IsBlank(BilledToEdit) || IsBlank(CurrencyEdit)))) & " missing required fields",
                            ""
                        ) &
                        If(
                            rdoProcessingMode.Selected.Value = "Review each invoice" && CountRows(Filter(colInvoiceParseResults, Not(ParseError) && Not(IsSaved))) > 0,
                            " · " & CountRows(Filter(colInvoiceParseResults, Not(ParseError) && Not(IsSaved))) & " not saved yet",
                            ""
                        )
                    )
                  Width: =300
            - btnDone:
                Control: ModernButton@1.0.0
                Properties:
                  Align: =Align.Center
                  DisplayMode: |-
                    =If(
                        gFinalizing ||
                        gProcessingBatch ||
                        CountRows(colInvoiceParseResults) = 0 ||
                        CountRows(Filter(colInvoiceParseResults, ParseError)) > 0 ||
                        IsBlank(ddDefaultCostCenter.Selected) ||
                        CountRows(Filter(colInvoiceParseResults, IsBlank(SupplierNameEdit) || IsBlank(TotalAmountEdit) || IsBlank(InvoiceNumberEdit) || IsBlank(InvoiceDateEdit) || IsBlank(BilledToEdit) || IsBlank(CurrencyEdit))) > 0 ||
                        (rdoProcessingMode.Selected.Value = "Review each invoice" && CountRows(Filter(colInvoiceParseResults, Not(IsSaved) || IsBlank(DescriptionEdit))) > 0),
                        DisplayMode.Disabled,
                        DisplayMode.Edit
                    )
                  FontWeight: =""
                  Height: =36
                  OnSelect: |-
                    =Set(gFinalizing, true);
                    ClearCollect(colFinalizeQueue, Filter(colInvoiceParseResults, Not(IsFinalized)));
                    Set(gFinalizingTotal, CountRows(colFinalizeQueue));
                    Set(gFinalizingBaseCount, CountRows(Filter(colInvoiceParseResults, IsFinalized)));
                    Clear(colFinalizeErrors);
                    With(
                        {
                            wResults: ForAll(
                                colFinalizeQueue,
                                With(
                                    {
                                        wRowId: RowId,
                                        wFileName: FileName,
                                        wExt: Last(Split(FileName, ".")).Value,
                                        wDate: If(IsBlank(InvoiceDateEdit), "", IfError(Text(DateValue(InvoiceDateEdit), "yyyymmdd"), InvoiceDateEdit))
                                    },
                                    With(
                                        {
                                            wName: wDate &
                                                If(IsBlank(SupplierNameEdit), "", " - " & SupplierNameEdit) &
                                                If(IsBlank(BilledToEdit), "", " - " & BilledToEdit) &
                                                If(IsBlank(InvoiceNumberEdit), "", " - " & InvoiceNumberEdit) &
                                                If(IsBlank(AttentionEdit), "", " - " & AttentionEdit) &
                                                If(IsBlank(DescriptionEdit), "", " - " & DescriptionEdit) &
                                                If(IsBlank(TotalAmountEdit), "", " - " & CurrencyEdit & TotalAmountEdit) &
                                                If(IsBlank(TaxAmountEdit), "", " - GST " & CurrencyEdit & TaxAmountEdit)
                                        },
                                        IfError(
                                            Finalize_Invoice.Run(
                                                InvoiceURL,
                                                gSelectedBatch.ID,
                                                If(
                                                    IsBlank(wName),
                                                    FileNameBase,
                                                    Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(wName, "\", ""), "/", ""), ":", ""), "*", ""), "?", ""), """", ""), "<", ""), ">", ""), "#", ""), "%", "")
                                                ) & "." & wExt,
                                                InvoiceNumberEdit & "",
                                                InvoiceDateEdit & "",
                                                SupplierNameEdit & "",
                                                BilledToEdit & "",
                                                Value(If(IsBlank(TotalAmountEdit), "0", TotalAmountEdit)),
                                                Value(If(IsBlank(TaxAmountEdit), "0", TaxAmountEdit)),
                                                CurrencyEdit & "",
                                                Coalesce(CostCenterEdit, ddDefaultCostCenter.Selected.Value),
                                                AttentionEdit & "",
                                                ABNEdit & "",
                                                Coalesce(ConfidenceScore, 0),
                                                DescriptionEdit & ""
                                            );
                                            Patch(colInvoiceParseResults, LookUp(colInvoiceParseResults, RowId = wRowId), {IsFinalized: true});
                                            true,
                                            Collect(colFinalizeErrors, {FileName: wFileName, ErrorMessage: FirstError.Message});
                                            false
                                        )
                                    )
                                )
                            )
                        },
                        Set(gFinalizing, false);
                        If(
                            CountRows(Filter(wResults, Value)) = CountRows(colFinalizeQueue),
                            Patch(BEUI_InvoiceBatch_Requests, gSelectedBatch, {Status: {Value: "Finalized"}});
                            Refresh(BEUI_InvoiceBatch_Requests);
                            Clear(colInvoiceParseResults);
                            Set(gInvoiceParseBatchID, Blank());
                            Notify("Batch finalized - invoices saved to the output library.", NotificationType.Success);
                            Navigate(HomeScreen),
                            Notify(
                                CountRows(colFinalizeErrors) & " invoice(s) failed to finalize: " & Concat(colFinalizeErrors, FileName & " → " & ErrorMessage, " · ") & ". Press Done again to retry the failed ones.",
                                NotificationType.Error
                            )
                        )
                    )
                  PaddingBottom: =5
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =5
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Text: ="✅ Done"
                  VerticalAlign: =VerticalAlign.Middle
                  Width: =140
      - containerScroll:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height - 120
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            PaddingBottom: =10
            PaddingTop: =10
            Width: =Parent.Width
            Y: =60
          Children:
            - rowUpload:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Start
                  DropShadow: =DropShadow.None
                  Height: =450
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =12
                  Visible: =Not(gProcessingBatch) && CountRows(colInvoiceParseResults) = 0
                  Width: =Parent.Width
                  X: =40
                  Y: =40
                Children:
                  - lblUploadLabel:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =11
                        Text: ="Invoice Files"
                        Width: =Parent.Width - 40
                  - lblUploadHint:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(136, 135, 128, 1)
                        Size: =10
                        Text: ="Attach one or more invoice files, then each new file is parsed one at a time."
                        Width: =Parent.Width - 40
                  - rowBatchSettings:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =120
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =40
                        PaddingTop: =4
                        Width: =Parent.Width - 40
                      Children:
                        - colDefaultCostCenter:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                              Width: =300
                            Children:
                              - lblDefaultCostCenter:
                                  Control: Label@2.5.1
                                  Properties:
                                    FontWeight: =FontWeight.Bold
                                    Size: =11
                                    Text: ="Default Cost Center *"
                                    Width: =Parent.Width
                              - ddDefaultCostCenter:
                                  Control: ComboBox@0.0.51
                                  Properties:
                                    Height: =40
                                    InputTextPlaceholder: ="Choose a cost center"
                                    Items: =Choices(BEUI_InvoiceBatch_Requests.CostCenter)
                                    Width: =Parent.Width
                        - colProcessingMode:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                              Width: =380
                            Children:
                              - lblProcessingMode:
                                  Control: Label@2.5.1
                                  Properties:
                                    FontWeight: =FontWeight.Bold
                                    Size: =11
                                    Text: ="Processing Mode"
                                    Width: =Parent.Width
                              - rdoProcessingMode:
                                  Control: Radio@0.0.25
                                  Properties:
                                    DefaultSelectedItems: =["Review each invoice"]
                                    Height: =40
                                    Items: =["Automatic (no review)", "Review each invoice"]
                                    Layout: ='RadioGroupCanvas.Layout'.Horizontal
                                    Width: =Parent.Width
                  - formBatchUpload:
                      Control: Form@2.4.4
                      Variant: Classic
                      Layout: Vertical
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        DataSource: =BEUI_InvoiceBatch_Requests
                        FillPortions: =0
                        Height: =120
                        Item: =gSelectedBatch
                        LayoutMinHeight: =120
                        NumberOfColumns: =1
                        OnFailure: |-
                          =Set(gProcessingBatch, false);
                          Notify("Upload failed. Please try again.", NotificationType.Error)
                        OnSuccess: |-
                          =If(
                              CountRows(colPendingUploadNames) = 0,
                              Set(gProcessingBatch, false);
                              Notify("Attachment saved.", NotificationType.Success),
                              Set(gParsingTotal, CountRows(colPendingUploadNames));
                              Set(gParsingBaseCount, CountRows(colInvoiceParseResults));
                              Set(gParsingInvoice, true);
                              Patch(
                                  BEUI_InvoiceBatch_Requests,
                                  gSelectedBatch,
                                  {
                                      Status: {Value: "Parsing"},
                                      CostCenter: {Value: ddDefaultCostCenter.Selected.Value}
                                  }
                              );
                              ForAll(
                                  colPendingUploadNames,
                                  With(
                                      {
                                          wURL: gSharePointAttachmentBase & Text(gSelectedBatch.ID) & "/" & EncodeUrl(Name),
                                          wBase: Left(Name, Len(Name) - Len("." & Last(Split(Name, ".")).Value))
                                      },
                                      With(
                                          {wResult: IfError(Parse_Invoice.Run(wURL, gSelectedBatch.ID), Blank())},
                                          Collect(
                                              colInvoiceParseResults,
                                              {
                                                  RowId: CountRows(colInvoiceParseResults) + 1,
                                                  FileName: Name,
                                                  FileNameBase: wBase,
                                                  InvoiceURL: wURL,
                                                  ParseError: IsBlank(wResult),
                                                  IsSaved: false,
                                                  IsFinalized: false,
                                                  CostCenterEdit: "",
                                                  DescriptionEdit: "",
                                                  JobId: wResult.jobId,
                                                  ConfidenceScore: Value(wResult.confidenceScore),
                                                  InvoiceDateEdit: wResult.invoiceDate,
                                                  SupplierNameEdit: wResult.supplierName,
                                                  BilledToEdit: wResult.billedTo,
                                                  InvoiceNumberEdit: wResult.invoiceNumber,
                                                  TotalAmountEdit: Text(Value(wResult.totalAmount), "0.00"),
                                                  TaxAmountEdit: Text(Value(wResult.taxAmount), "0.00"),
                                                  CurrencyEdit: wResult.currency,
                                                  AttentionEdit: wResult.attention,
                                                  ABNEdit: wResult.supplierABN
                                              }
                                          )
                                      )
                                  )
                              );
                              Set(gParsingInvoice, false);
                              Patch(
                                  BEUI_InvoiceBatch_Requests,
                                  gSelectedBatch,
                                  {
                                      Status: {
                                          Value: If(
                                              CountRows(Filter(colInvoiceParseResults, ParseError)) > 0,
                                              "Completed with errors",
                                              "Completed"
                                          )
                                      }
                                  }
                              );
                              ClearCollect(colBaselineAttachmentNames, ForAll(gSelectedBatch.Attachments, {Name: DisplayName}));
                              Clear(colPendingUploadNames);
                              Set(gProcessingBatch, false)
                          )
                        Width: =Parent.Width - 40
                      Children:
                        - dcInvoices:
                            Control: TypedDataCard@1.0.7
                            Variant: ClassicAttachmentsEdit
                            Properties:
                              DataField: ="{Attachments}"
                              Default: =Blank()
                              DisplayMode: =DisplayMode.Edit
                              DisplayName: =""
                              Height: =120
                              Required: =false
                              Update: =attInvoices.Attachments
                              Width: =Parent.Width
                              X: =0
                              Y: =0
                            Children:
                              - attInvoices:
                                  Control: Attachments@2.3.0
                                  Properties:
                                    Height: =120
                                    Items: =Parent.Default
                                    MaxAttachments: =25
                                    Width: =Parent.Width
                  - rowParse:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =100
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =18
                      Children:
                        - btnUploadParse:
                            Control: ModernButton@1.0.0
                            Properties:
                              Align: =Align.Center
                              FontWeight: =""
                              Height: =36
                              OnSelect: |-
                                =If(
                                    IsBlank(ddDefaultCostCenter.Selected),
                                    Notify("Please choose a default Cost Center before uploading invoices.", NotificationType.Error),
                                    ClearCollect(colPendingUploadNames, Filter(attInvoices.Attachments, Not(Name in colBaselineAttachmentNames.Name)));
                                    If(
                                        CountRows(colPendingUploadNames) = 0,
                                        Notify("Please attach at least one new invoice file first.", NotificationType.Error),
                                        Set(gProcessingBatch, true);
                                        SubmitForm(formBatchUpload)
                                    )
                                )
                              PaddingBottom: =5
                              PaddingLeft: =12
                              PaddingRight: =12
                              PaddingTop: =5
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              Text: |-
                                ="📤 Upload & Parse"
                              VerticalAlign: =VerticalAlign.Middle
                              Width: =180
                              X: =40
                              Y: =40
            - rowProcessing:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =220
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingTop: =40
                  Visible: =gProcessingBatch || gFinalizing
                  Width: =Parent.Width
                Children:
                  - lblProcessingTitle:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =RGBA(56, 96, 178, 1)
                        FontWeight: =FontWeight.Bold
                        Height: =30
                        Size: =12
                        Text: |-
                          =If(
                              gFinalizing,
                              "⏳ Finalizing invoice " & (CountRows(Filter(colInvoiceParseResults, IsFinalized)) - gFinalizingBaseCount) & " / " & gFinalizingTotal & "...",
                              gParsingInvoice,
                              "⏳ Parsing invoice " & (CountRows(colInvoiceParseResults) - gParsingBaseCount) & " / " & gParsingTotal & "...",
                              "⏳ Uploading invoice files..."
                          )
                        Width: =Parent.Width - 80
                  - lblProcessingHint:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =RGBA(136, 135, 128, 1)
                        Height: =22
                        Size: =10
                        Text: ="Please keep this page open until processing completes."
                        Width: =Parent.Width - 80
            - rowReview:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Height: =1000
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =12
                  PaddingLeft: =10
                  PaddingRight: =10
                  Visible: =Not(gProcessingBatch) && Not(gFinalizing) && CountRows(colInvoiceParseResults) > 0
                  Width: =Parent.Width
                  X: =40
                  Y: =40
                Children:
                  - colInvoiceList:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =Parent.Height
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        Width: =380
                      Children:
                        - galInvoiceList:
                            Control: Gallery@2.15.0
                            Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                            Properties:
                              Height: =Parent.Height
                              Items: =colInvoiceParseResults
                              LayoutMinHeight: =300
                              OnSelect: |-
                                =Set(gSelectedInvoiceRow, ThisItem);
                                Reset(txtDetailInvoiceDate);
                                Reset(txtDetailSupplierName);
                                Reset(txtDetailBilledTo);
                                Reset(txtDetailInvoiceNumber);
                                Reset(txtDetailTotalAmount);
                                Reset(txtDetailTaxAmount);
                                Reset(txtDetailCurrency);
                                Reset(txtDetailAttention);
                                Reset(txtDetailABN);
                                Reset(txtDetailDescription);
                                Reset(ddDetailCostCenter)
                              TemplateFill: |-
                                =If(
                                    ThisItem.RowId = gSelectedInvoiceRow.RowId,
                                    If(
                                        ThisItem.ParseError,
                                        RGBA(240, 128, 132, 1),
                                        ThisItem.IsSaved,
                                        RGBA(178, 228, 176, 1),
                                        RGBA(255, 227, 145, 1)
                                    ),
                                    If(
                                        ThisItem.ParseError,
                                        RGBA(247, 168, 170, 1),
                                        ThisItem.IsSaved,
                                        RGBA(223, 246, 221, 1),
                                        RGBA(255, 244, 206, 1)
                                    )
                                )
                              TemplatePadding: =10
                              TemplateSize: =100
                              Width: =Parent.Width
                              WrapCount: =0
                            Children:
                              - galInvoiceListButtons:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    Height: =30
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =10
                                    PaddingLeft: =8
                                    PaddingRight: =8
                                    Width: =Parent.Width - 30
                                    Y: =60
                                  Children:
                                    - btnRetryParse:
                                        Control: ModernButton@1.0.0
                                        Properties:
                                          Align: =Align.Center
                                          BasePaletteColor: =RGBA(196, 49, 75, 1)
                                          BorderStyle: =BorderStyle.None
                                          FontWeight: =""
                                          Height: =30
                                          OnSelect: |-
                                            =With(
                                                {wResult: IfError(Parse_Invoice.Run(ThisItem.InvoiceURL, gSelectedBatch.ID), Blank())},
                                                If(
                                                    IsBlank(wResult),
                                                    Notify("Parse failed again for " & ThisItem.FileName & ". You can fix the fields manually.", NotificationType.Error),
                                                    Patch(
                                                        colInvoiceParseResults,
                                                        LookUp(colInvoiceParseResults, RowId = ThisItem.RowId),
                                                        {
                                                            ParseError: false,
                                                            IsSaved: false,
                                                            JobId: wResult.jobId,
                                                            ConfidenceScore: Value(wResult.confidenceScore),
                                                            InvoiceDateEdit: wResult.invoiceDate,
                                                            SupplierNameEdit: wResult.supplierName,
                                                            BilledToEdit: wResult.billedTo,
                                                            InvoiceNumberEdit: wResult.invoiceNumber,
                                                            TotalAmountEdit: Text(Value(wResult.totalAmount), "0.00"),
                                                            TaxAmountEdit: Text(Value(wResult.taxAmount), "0.00"),
                                                            CurrencyEdit: wResult.currency,
                                                            AttentionEdit: wResult.attention,
                                                            ABNEdit: wResult.supplierABN
                                                        }
                                                    );
                                                    If(
                                                        gSelectedInvoiceRow.RowId = ThisItem.RowId,
                                                        Set(gSelectedInvoiceRow, LookUp(colInvoiceParseResults, RowId = ThisItem.RowId));
                                                        Reset(txtDetailInvoiceDate);
                                                        Reset(txtDetailSupplierName);
                                                        Reset(txtDetailBilledTo);
                                                        Reset(txtDetailInvoiceNumber);
                                                        Reset(txtDetailTotalAmount);
                                                        Reset(txtDetailTaxAmount);
                                                        Reset(txtDetailCurrency);
                                                        Reset(txtDetailAttention);
                                                        Reset(txtDetailABN);
                                                        Reset(txtDetailDescription);
                                                        Reset(ddDetailCostCenter)
                                                    );
                                                    Notify("Parse succeeded for " & ThisItem.FileName & ".", NotificationType.Success)
                                                )
                                            )
                                          PaddingBottom: =5
                                          PaddingLeft: =8
                                          PaddingRight: =8
                                          PaddingTop: =5
                                          RadiusBottomLeft: =4
                                          RadiusBottomRight: =4
                                          RadiusTopLeft: =4
                                          RadiusTopRight: =4
                                          Size: =12
                                          Text: ="↻ Retry"
                                          VerticalAlign: =VerticalAlign.Middle
                                          Visible: =ThisItem.ParseError
                                          Width: =90
                                          X: =40
                                          Y: =40
                                    - btnSelectInvoiceRow:
                                        Control: ModernButton@1.0.0
                                        Properties:
                                          Align: =Align.Center
                                          BasePaletteColor: |-
                                            =If(
                                                ThisItem.RowId = gSelectedInvoiceRow.RowId,
                                                RGBA(83, 74, 183, 1),
                                                If(ThisItem.ParseError, RGBA(196, 49, 75, 1), RGBA(5, 102, 178, 1))
                                            )
                                          BorderStyle: =BorderStyle.None
                                          FontWeight: =""
                                          Height: =30
                                          OnSelect: |-
                                            =Set(gSelectedInvoiceRow, ThisItem);
                                            Reset(txtDetailInvoiceDate);
                                            Reset(txtDetailSupplierName);
                                            Reset(txtDetailBilledTo);
                                            Reset(txtDetailInvoiceNumber);
                                            Reset(txtDetailTotalAmount);
                                            Reset(txtDetailTaxAmount);
                                            Reset(txtDetailCurrency);
                                            Reset(txtDetailAttention);
                                            Reset(txtDetailABN);
                                            Reset(txtDetailDescription);
                                            Reset(ddDetailCostCenter)
                                          PaddingBottom: =5
                                          PaddingLeft: =12
                                          PaddingRight: =12
                                          PaddingTop: =5
                                          RadiusBottomLeft: =4
                                          RadiusBottomRight: =4
                                          RadiusTopLeft: =4
                                          RadiusTopRight: =4
                                          Size: =12
                                          Text: =If(ThisItem.RowId = gSelectedInvoiceRow.RowId, "✓ Selected", If(ThisItem.ParseError, "Fix", "Select"))
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =100
                                          Y: =40
                              - lblInvoiceRowSubtitle:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =If(ThisItem.ParseError, RGBA(168, 0, 0, 1), RGBA(136, 135, 128, 1))
                                    Height: =18
                                    PaddingBottom: =0
