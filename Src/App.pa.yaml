App:
  Properties:
    OnStart: |-
      =Set(gAppReady, false);
      Set(gCurrentEmployee, LookUp('Employee List', Email = User().Email));
      Set(gSelectedBatch, Blank());
      Set(gInvoiceParseBatchID, Blank());
      Set(gSelectedInvoiceRow, Blank());
      Set(gParsingInvoice, false);
      Set(gProcessingBatch, false);
      Set(gParsingCurrent, 0);
      Set(gParsingTotal, 0);
      Set(gFinalizing, false);
      Set(gSharePointAttachmentBase, "https://maxbiocare.sharepoint.com/sites/Powerapps/Lists/BEUI_InvoiceBatch_Requests/Attachments/");
      Set(gAppReady, true)
    Theme: =PowerAppsTheme
