Screens:
  HomeScreen:
    Properties:
      Fill: =RGBA(245, 246, 250, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(gSelectedBatch, Blank());
        Set(gSelectedInvoiceRow, Blank());
        Refresh(BEUI_InvoiceBatch_Requests)
    Children:
      - rectHeader:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Invoice Batch Upload"
            Width: =500
            X: =20
      - lblUserInfo:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(230, 228, 250, 1)
            Height: =60
            Size: =10
            Text: =gCurrentEmployee.Title
            Width: =320
            X: =Parent.Width - 500
      - btnNewBatch:
          Control: ModernButton@1.0.0
          Properties:
            Align: =Align.Center
            BasePaletteColor: =RGBA(5, 102, 178, 1)
            FontWeight: =""
            Height: =36
            OnSelect: |-
              =With(
                  {
                      wBatch: Patch(
                          BEUI_InvoiceBatch_Requests,
                          Defaults(BEUI_InvoiceBatch_Requests),
                          {
                              Title: "Batch - " & Text(Now(), "yyyy-mm-dd hh:mm") & " - " & gCurrentEmployee.Title,
                              Status: {Value: "Pending"},
                              UploadedByID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                              UploadedAt: Now()
                          }
                      )
                  },
                  If(
                      IsBlank(wBatch.ID),
                      Notify("Failed to create batch. Please try again.", NotificationType.Error),
                      Set(gSelectedBatch, wBatch);
                      Navigate(BatchUploadScreen)
                  )
              )
            PaddingBottom: =5
            PaddingLeft: =12
            PaddingRight: =12
            PaddingTop: =5
            RadiusBottomLeft: =4
            RadiusBottomRight: =4
            RadiusTopLeft: =4
            RadiusTopRight: =4
            Text: ="+ New Batch"
            VerticalAlign: =VerticalAlign.Middle
            Width: =140
            X: =Parent.Width - 160
            Y: =12
      - lblSectionTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(50, 49, 48, 1)
            FontWeight: =FontWeight.Bold
            Height: =28
            Size: =12
            Text: ="My Batches (" & CountRows(galBatches.AllItems) & ")"
            Width: =400
            X: =20
            Y: =77
      - galBatches:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            Height: =Parent.Height - 105
            Items: =SortByColumns(Filter(BEUI_InvoiceBatch_Requests, UploadedByID.Id = gCurrentEmployee.ID), "UploadedAt", SortOrder.Descending)
            OnSelect: |-
              =Set(gSelectedBatch, ThisItem);
              Navigate(BatchUploadScreen)
            TemplatePadding: =16
            TemplateSize: =70
            Width: =Parent.Width
            Y: =105
          Children:
            - rowBatch:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =68
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  PaddingLeft: =20
                  PaddingRight: =16
                  Width: =Parent.TemplateWidth
                Children:
                  - colBatchInfo:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                        LayoutMinHeight: =68
                        Width: =550
                      Children:
                        - lblBatchTitle:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(50, 49, 48, 1)
                              FontWeight: =FontWeight.Bold
                              Height: =22
                              Size: =11
                              Text: =ThisItem.Title
                              Width: =Parent.Width
                        - lblBatchMeta:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              Size: =9
                              Text: |-
                                ="Uploaded " & Text(ThisItem.UploadedAt, "yyyy-mm-dd hh:mm") & " · " &
                                If(
                                    ThisItem.Status.Value = "Finalized",
                                    "all files processed",
                                    CountRows(ThisItem.Attachments) & " file(s) to process"
                                )
                              Width: =Parent.Width
                  - colBatchRight:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =12
                        LayoutJustifyContent: =LayoutJustifyContent.End
                        LayoutMinHeight: =68
                        Width: =300
                      Children:
                        - lblBatchStatus:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              Color: |-
                                =Switch(
                                    ThisItem.Status.Value,
                                    "Finalized", RGBA(16, 124, 16, 1),
                                    "Completed", RGBA(30, 140, 70, 1),
                                    "Completed with errors", RGBA(157, 93, 0, 1),
                                    "Parsing", RGBA(56, 96, 178, 1),
                                    RGBA(96, 94, 92, 1)
                                )
                              Fill: |-
                                =Switch(
                                    ThisItem.Status.Value,
                                    "Finalized", RGBA(223, 246, 221, 1),
                                    "Completed", RGBA(223, 246, 221, 1),
                                    "Completed with errors", RGBA(255, 244, 206, 1),
                                    "Parsing", RGBA(219, 234, 254, 1),
                                    RGBA(237, 235, 233, 1)
                                )
                              FontWeight: =FontWeight.Semibold
                              Height: =28
                              Size: =9
                              Text: =ThisItem.Status.Value
                              Width: =190
      - lblEmptyState:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =RGBA(136, 135, 128, 1)
            Height: =60
            Size: =11
            Text: ="No batches yet. Click ""+ New Batch"" to create your first invoice batch."
            Visible: =CountRows(galBatches.AllItems) = 0
            Width: =Parent.Width
            Y: =Parent.Height / 2 - 30
